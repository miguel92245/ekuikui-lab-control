<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secretaria | EKuikui Lab Control</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Bibliotecas -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/secretaria.css">
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo"><h2><i class="fas fa-chalkboard-user"></i> EKuikui Lab Control</h2></div>
        <div class="user-info">
            <i class="fas fa-user-shield"></i> Secretaria
            <button id="logoutBtn" class="logout-btn">Sair</button>
        </div>
    </div>

    <div class="stats" id="stats"></div>

    <div class="actions">
        <button class="btn btn-primary" onclick="abrirModal('modalProfessor')"><i class="fas fa-user-plus"></i> Professor</button>
        <button class="btn btn-primary" onclick="abrirModal('modalTurma')"><i class="fas fa-users"></i> Turma</button>
        <button class="btn btn-primary" onclick="abrirModal('modalLab')"><i class="fas fa-microchip"></i> Laboratório</button>
        <button class="btn btn-warning" id="btnGerar"><i class="fas fa-magic"></i> Gerar Distribuição</button>
        <button class="btn btn-success" id="btnPublicar"><i class="fas fa-check-circle"></i> Publicar</button>
    </div>

    <div class="tabs">
        <button class="tab active" data-tab="tab-professores">Professores</button>
        <button class="tab" data-tab="tab-turmas">Turmas</button>
        <button class="tab" data-tab="tab-labs">Laboratórios</button>
        <button class="tab" data-tab="tab-aulas">Aulas (Excel)</button>
        <button class="tab" data-tab="tab-horarios">Horários</button>
        <button class="tab" data-tab="tab-conflitos">Conflitos <span id="conflitosCount" class="count-badge">0</span></button>
    </div>

    <div id="tab-professores" class="tab-content active"><div class="table-wrapper"><table id="tabelaProfessores"><thead><tr><th>Nome</th><th>Email</th><th>Ações</th></tr></thead><tbody></tbody></table></div></div>
    <div id="tab-turmas" class="tab-content"><div class="table-wrapper"><table id="tabelaTurmas"><thead><tr><th>Turma</th><th>Curso</th><th>Nº Alunos</th><th>Ações</th></tr></thead><tbody></tbody></table></div></div>
    <div id="tab-labs" class="tab-content"><div class="table-wrapper"><table id="tabelaLabs"><thead><tr><th>Nome</th><th>Capacidade</th><th>Ações</th></tr></thead><tbody></tbody></table></div></div>
    <div id="tab-aulas" class="tab-content">
        <div class="upload-area" id="uploadArea">
            <i class="fas fa-cloud-upload-alt"></i>
            <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display: none;">
        </div>
        <div id="preview" class="preview-table"></div>
    </div>
    <div id="tab-horarios" class="tab-content"><div id="horarioDisplay"></div></div>
    <div id="tab-conflitos" class="tab-content"><div id="conflitosList"></div></div>
</div>

<!-- MODAIS -->
<div id="modalProfessor" class="modal"><div class="modal-content"><h3>Cadastrar Professor</h3><form id="formProfessor"><div class="form-group"><label>Nome</label><input type="text" id="profNome" required></div><div class="form-group"><label>Email</label><input type="email" id="profEmail" required></div><div class="form-group"><label>Senha</label><input type="text" id="profSenha" value="123456" required></div><button type="submit" class="btn btn-primary">Cadastrar</button></form><button onclick="fecharModal('modalProfessor')" class="btn-cancel">Cancelar</button></div></div>

<div id="modalTurma" class="modal"><div class="modal-content"><h3>Cadastrar Turma</h3><form id="formTurma"><div class="form-group"><label>Nome da Turma</label><input type="text" id="turmaNome" required></div><div class="form-group"><label>Curso</label><input type="text" id="turmaCurso" required></div><div class="form-group"><label>Nº de Alunos</label><input type="number" id="turmaAlunos" required></div><button type="submit" class="btn btn-primary">Cadastrar</button></form><button onclick="fecharModal('modalTurma')" class="btn-cancel">Cancelar</button></div></div>

<div id="modalLab" class="modal"><div class="modal-content"><h3>Cadastrar Laboratório</h3><form id="formLab"><div class="form-group"><label>Nome</label><input type="text" id="labNome" required></div><div class="form-group"><label>Capacidade</label><input type="number" id="labCap" required></div><button type="submit" class="btn btn-primary">Cadastrar</button></form><button onclick="fecharModal('modalLab')" class="btn-cancel">Cancelar</button></div></div>

<script src="js/secretaria.js"></script>
</body>
</html>
