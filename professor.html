<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professor | EKuikui Lab Control</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/professor.css">
</head>
<body>
<div class="dashboard-container">
    <div class="header">
        <div class="logo"><h2><i class="fas fa-chalkboard-user"></i> EKuikui Lab Control</h2></div>
        <div class="user-info">
            <i class="fas fa-user"></i> <span id="profNome"></span>
            <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Sair</button>
        </div>
    </div>
<!-- Botões de ação ) -->
    <div class="actions">
        <button class="btn btn-primary" onclick="abrirModal('modalProfessor')"><i class="fas fa-user-plus"></i> Disciplinas</button>
        <button class="btn btn-primary" onclick="abrirModal('modalTurma')"><i class="fas fa-users"></i> Número de Aulas</button>
        <button class="btn btn-primary" onclick="abrirModal('modalSala')"><i class="fas fa-building"></i> Percentual</button>
        <button class="btn btn-primary" onclick="abrirModal('modalLab')"><i class="fas fa-microchip"></i> Dias de Aulas</button>
        <button class="btn btn-primary" onclick="abrirModal('modalLab')"><i class="fas fa-microchip"></i> Tempos</button>
    </div>

    <!-- Horário Semestral -->
    <div class="glass-card">
        <h3 class="card-title"><i class="fas fa-calendar-alt"></i> Horário Semestral</h3>
        <div class="table-wrapper">
            <table class="data-table" id="tabelaHorario">
                <thead>
                    <tr><th>Dia</th><th>Disciplina</th><th>Turma</th><th>Horário</th><th>Laboratório</th></tr>
                </thead>
                <tbody id="horarioBody"></tbody>
            </table>
        </div>
    </div>
<!-- MODAL PROFESSOR (com campo disciplinas) -->
<div id="modalProfessor" class="modal">
    <div class="modal-content">
        <h3>Cadastrar Disciplinas</h3>
        <form id="formProfessor">
            <div class="form-group"><label>Nome</label><input type="text" id="profNome" required></div>
            <div class="form-group"><label>Email</label><input type="email" id="profEmail" required></div>
            <div class="form-group"><label>Senha</label><input type="text" id="profSenha" value="123456" required></div>
            <div class="form-group"><label>Disciplinas (separadas por vírgula)</label><input type="text" id="profDisciplinas" placeholder="Ex: Programação Web, Base de Dados"></div>
            <button type="submit" class="btn btn-primary">Cadastrar</button>
        </form>
        <button onclick="fecharModal('modalProfessor')" class="btn-cancel">Cancelar</button>
    </div>
</div>

<!-- MODAL TURMA -->
<div id="modalTurma" class="modal">
    <div class="modal-content">
        <h3>Cadastrar Turma</h3>
        <form id="formTurma">
            <div class="form-group"><label>Nome da Turma</label><input type="text" id="turmaNome" required></div>
            <div class="form-group"><label>Curso</label><input type="text" id="turmaCurso" required></div>
            <div class="form-group"><label>Nº de Alunos</label><input type="number" id="turmaAlunos" required></div>
            <button type="submit" class="btn btn-primary">Cadastrar</button>
        </form>
        <button onclick="fecharModal('modalTurma')" class="btn-cancel">Cancelar</button>
    </div>
</div>

<!-- MODAL SALA -->
<div id="modalSala" class="modal">
    <div class="modal-content">
        <h3>Cadastrar Sala</h3>
        <form id="formSala">
            <div class="form-group"><label>Nome da Sala</label><input type="text" id="salaNome" required></div>
            <div class="form-group"><label>Capacidade</label><input type="number" id="salaCapacidade" required></div>
            <button type="submit" class="btn btn-primary">Cadastrar</button>
        </form>
        <button onclick="fecharModal('modalSala')" class="btn-cancel">Cancelar</button>
    </div>
</div>

<!-- MODAL LABORATÓRIO -->
<div id="modalLab" class="modal">
    <div class="modal-content">
        <h3>Cadastrar Laboratório</h3>
        <form id="formLab">
            <div class="form-group"><label>Nome</label><input type="text" id="labNome" required></div>
            <div class="form-group"><label>Capacidade</label><input type="number" id="labCap" required></div>
            <button type="submit" class="btn btn-primary">Cadastrar</button>
        </form>
        <button onclick="fecharModal('modalLab')" class="btn-cancel">Cancelar</button>
    </div>
</div>


    <!-- Reclamação -->
    <div class="glass-card">
        <h3 class="card-title"><i class="fas fa-exclamation-triangle"></i> Reclamação</h3>
        <textarea id="reclamacaoMsg" rows="3" class="textarea-field" placeholder="Escreva sua reclamação..."></textarea>
        <button id="reclamarBtn" class="btn btn-warning"><i class="fas fa-paper-plane"></i> Enviar Reclamação</button>
    </div>
</div>

<!-- Modal Configurar Disciplina -->
<div id="modalConfig" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitulo">Configurar Disciplina</h3>
            <span class="close-modal" onclick="fecharModal()">&times;</span>
        </div>
        <div class="form-group"><label>Nº Total de Aulas no Semestre</label><input type="number" id="totalAulas" class="input-field" placeholder="Ex: 14"></div>
        <div class="form-group"><label>Percentagem de Aulas Práticas (Máx 80%)</label><input type="number" id="percPratica" class="input-field" placeholder="Ex: 60"></div>
        <div class="form-group"><label>Percentagem de Aulas Teóricas</label><input type="number" id="percTeorica" class="input-field" placeholder="Ex: 40" readonly></div>
        <div class="form-group"><label>Dias da Semana</label><div class="dias-group" id="diasCheckbox"></div></div>
        <div class="form-group"><label>Hora Início</label><input type="time" id="horaInicio" class="input-field"></div>
        <div class="form-group"><label>Hora Fim</label><input type="time" id="horaFim" class="input-field"></div>
        <div class="modal-buttons">
            <button id="salvarConfigBtn" class="btn btn-primary">Salvar</button>
            <button onclick="fecharModal()" class="btn btn-danger">Cancelar</button>
        </div>
    </div>
</div>

<script src="js/professor.js"></script>
</body>
</html>
