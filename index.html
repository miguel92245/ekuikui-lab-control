<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EKuikui Lab Control</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-shapes">
    <div class="shape shape1"></div>
    <div class="shape shape2"></div>
    <div class="shape shape3"></div>
    <div class="shape shape4"></div>
</div>

<div class="login-container">

    <!-- LADO ESQUERDO -->
    <div class="info-panel">
        <div class="logo-area">
            <i class="fas fa-microchip logo-icon"></i>
            <i class="fas fa-chalkboard-user logo-icon"></i>
        </div>
<div class="bg-effects">
    <span></span>
    <span></span>
    <span></span>
</div>
        <h1>EKuikui Lab<br>Control</h1>
        <p>Gestão inteligente de laboratórios e salas de aula.</p>

        <ul class="feature-list">
            <li><i class="fas fa-check-circle"></i> Planeamento centralizado</li>
            <li><i class="fas fa-laptop-code"></i> 4 laboratórios</li>
            <li><i class="fas fa-calendar-alt"></i> Distribuição automática</li>
            <li><i class="fas fa-chart-line"></i> Relatórios</li>
        </ul>
    </div>

    <!-- LADO DIREITO -->
    <div class="form-panel">

        <!-- LOGO -->
        <div class="logo-top">
            <img src="Ekuikui.webp" alt="Logo">
        </div>

        <h2>Bem-vindo de volta</h2>
        <p class="subtitle">Acesse o painel</p>

        <form id="loginForm">

            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="E-mail" required>
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Senha" required>
            </div>

            <div class="options">
                <label><input type="checkbox" id="remember"> Lembrar-me</label>
                <a href="#">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="login-btn">
                Entrar
            </button>

            <p class="register-info">
                Ainda não tem acesso? <a href="#">Solicitar</a>
            </p>

        </form>
    </div>
</div>

<div id="toast" class="toast-message"></div>

<script src="script.js"></script>
</body>
</html>
