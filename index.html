<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EKuikui Lab Control</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape1"></div>
        <div class="shape shape2"></div>
        <div class="shape shape3"></div>
        <div class="shape shape4"></div>
    </div>

    <div class="login-container">
        <div class="info-panel">
            <div class="logo-area">
                <i></i>
                <i></i>
            </div>
            <h1>EKuikui Lab Control</h1>
            <p>Gestão de laboratórios e salas de aula.</p>
            <ul class="feature-list">
                <li><i class="fas fa-check-circle"></i> Planeamento centralizado</li>
                <li><i class="fas fa-check-circle"></i> Organização e gestão eficienete</li>
                <li><i class="fas fa-laptop-code"></i> 4 laboratórios</li>
                <li><i class="fas fa-calendar-alt"></i> Distribuição automática</li>
            </ul>
        </div>
        <div class="form-panel">
            <h2>Bem-vindo de volta</h2>
            <div class="subtitle">Acesse o painel de controle</div>
            <form id="loginForm">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="E-mail" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Senha" required>
                </div>
                <div class="options">
                    <label class="checkbox">
                        <input type="checkbox" id="remember"> Lembrar-me
                    </label>
                    <a href="#" class="forgot-link">Esqueceu a senha?</a>
                </div>
                <button type="submit" class="login-btn">
                    <i class="fas fa-arrow-right-to-bracket"></i> Entrar
                </button>
            </form>
            <div id="loginError" class="error-msg"></div>
            <p class="demo-cred">Demo: secretaria@ekuikui / admin</p>
        </div>
    </div>
    <div id="toast" class="toast-message"></div>

    <script src="js/login.js"></script>
</body>
</html>
