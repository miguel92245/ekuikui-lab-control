<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EKuikui Lab Control</title>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <div class="bg-shapes">
        <div class="shape shape1"></div>
        <div class="shape shape2"></div>
        <div class="shape shape3"></div>
        <div class="shape shape4"></div>
    </div>

    <div class="login-container">
        <div class="info-panel">
            <div class="logo-area">
                <i class="fas fa-microchip logo-icon"></i>
                <i class="fas fa-chalkboard-user logo-icon"></i>
            </div>
            <ul class="feature-list">
                <h1><img src="logo-300x75.png" alt="logo-300x75"> </h1>
                <li><i class="fas fa-check-circle"></i> Planeamento centralizado</li>
                <li><i class="fas fa-check-circle"></i> Organização, planeamento e gestão eficienete</li>
                <li><i class="fas fa-laptop-code"></i> 4 laboratórios</li>
                <li><i class="fas fa-calendar-alt"></i> Distribuição automática</li>
            </ul>
        </div>
        <div class="form-panel">
            <h2>Bem-vindo</h2>
            <div class="subtitle">Acesse o painel</div>
            <form id="loginForm">
                <div class="input-group">
                    <i class="fas fa-user"></i>  
                    <input type="email" id="email" placeholder="E-mail" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Senha" required>
                </div>
                <div class="options">
                    <label class="checkbox">
                        <input type="checkbox" id="remember"> Lembrar-me
                    </label>
                    <a href="#" class="forgot-link">Esqueceu a senha?</a>
                     <a href="#" class="forgot-link"> Recuperar Senha</a>
                </div>
                <button type="submit" class="login-btn">
                    <i class="fas fa-arrow-right-to-bracket"></i> Entrar
                </button>
            </form>
            <div id="loginError" class="error-msg"></div>
        </div>
    </div>
    <div id="toast" class="toast-message"></div>
    <script src="js/login.js"></script>
</body>
</html>
